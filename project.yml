name: OrchardPlayer
options:
  bundleIdPrefix: local.orchardplayer
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
targets:
  OrchardPlayer:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: Resources/LaunchScreen.storyboard
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: local.orchardplayer.app
        PRODUCT_NAME: Orchard Player
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
    scheme:
      testTargets: []
