name: Build unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build without code signing
        run: |
          xcodebuild \
            -project OrchardPlayer.xcodeproj \
            -scheme OrchardPlayer \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          APP_PATH="DerivedData/Build/Products/Release-iphoneos/Orchard Player.app"
          test -d "$APP_PATH"
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload OrchardPlayer-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OrchardPlayer-unsigned-ipa
          path: OrchardPlayer-unsigned.ipa
          if-no-files-found: error
          retention-days: 7
